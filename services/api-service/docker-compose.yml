services:
  app:
    container_name: allstar-api-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: allstar-api:dev
    ports:
      - "80:8000"
    env_file:
      - ./keys.dev.env
    environment:
      BW_ACCESS_TOKEN: ${BW_ACCESS_TOKEN}
    volumes:
      - ./src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
