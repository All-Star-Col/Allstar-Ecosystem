name: Deploy API Service

on:
  push:
    branches: ["main"]
    paths:
      - 'services/api-service/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api
  cancel-in-progress: true

env:
  IMAGE_NAME: starbotdocker/allstar-fastapi-repository
  ENVIRONMENT: prod

jobs:
  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-service
          file: ./services/api-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:prod
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy_to_vm:
    name: Deploy to VM via Tailscale SSH
    runs-on: ubuntu-latest
    needs: build_and_push
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale connectivity
        run: |
          tailscale status
          tailscale ping -c 3 ${{ secrets.VM_TAILSCALE_IP }} || true

      - name: Write SSH private key
        run: |
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > /tmp/id_key
          chmod 600 /tmp/id_key
          ssh-keygen -y -f /tmp/id_key > /dev/null

      - name: Verify TCP port 22
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q netcat-openbsd
          nc -vz ${{ secrets.VM_TAILSCALE_IP }} 22

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VM_TAILSCALE_IP }}" >> ~/.ssh/known_hosts

      - name: Run deploy script on VM
        run: |
          ssh -i /tmp/id_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "BW_ACCESS_TOKEN='${{ secrets.BW_ACCESS_TOKEN }}' \
            ENVIRONMENT='${{ env.ENVIRONMENT }}' \
            DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
            DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}' \
            /opt/allstar-api/deploy.sh"

      - name: Verify API health on VM
        run: |
          ssh -i /tmp/id_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "set -e
            echo 'Container status:'
            docker ps -a --filter name=allstar-api
            echo 'Waiting for API health...'
            for i in \$(seq 1 12); do
              if curl -fsS http://127.0.0.1:8000/api/v1/public; then
                echo
                echo 'API healthcheck passed.'
                exit 0
              fi
              sleep 5
            done
            echo 'API did not become healthy. Last container logs:'
            docker logs --tail 200 allstar-api || true
            exit 1"
