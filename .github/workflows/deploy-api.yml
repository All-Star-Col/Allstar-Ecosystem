name: Deploy API Service

on:
  push:
    branches: ["main"]
    paths:
      - 'services/api-service/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api
  cancel-in-progress: true

env:
  IMAGE_NAME: starbotdocker/allstar-fastapi-repository
  ENVIRONMENT: prod
  PUBLIC_API_HEALTH_URL: https://api-vm.tail6cef8e.ts.net/api/v1/health/live

jobs:
  build_and_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-service
          file: ./services/api-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:prod
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy_to_vm:
    name: Deploy to VM via Tailscale SSH
    runs-on: ubuntu-latest
    needs: build_and_push
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale connectivity
        run: |
          tailscale status
          tailscale ping -c 3 ${{ secrets.VM_TAILSCALE_IP }} || true

      - name: add SSH connection
        run: |
          sudo tailscale set --ssh

      - name: Write SSH private key
        run: |
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" > /tmp/id_key
          chmod 600 /tmp/id_key
          ssh-keygen -y -f /tmp/id_key > /dev/null

      - name: Verify TCP port 22
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q netcat-openbsd
          nc -vz ${{ secrets.VM_TAILSCALE_IP }} 22

      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VM_TAILSCALE_IP }}" >> ~/.ssh/known_hosts

      - name: Run deploy script on VM
        env:
          BW_ACCESS_TOKEN_VALUE: ${{ secrets.BW_ACCESS_TOKEN }}
          AZURE_STORAGE_CONNECTION_STRING_VALUE: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          DOCKERHUB_USERNAME_VALUE: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN_VALUE: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          encode_secret() {
            printf '%s' "$1" | base64 -w 0
          }
          BW_ACCESS_TOKEN_B64="$(encode_secret "$BW_ACCESS_TOKEN_VALUE")"
          AZURE_STORAGE_CONNECTION_STRING_B64="$(encode_secret "$AZURE_STORAGE_CONNECTION_STRING_VALUE")"
          DOCKERHUB_USERNAME_B64="$(encode_secret "$DOCKERHUB_USERNAME_VALUE")"
          DOCKERHUB_TOKEN_B64="$(encode_secret "$DOCKERHUB_TOKEN_VALUE")"

          ssh -i /tmp/id_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "set -e
            export BW_ACCESS_TOKEN=\"\$(printf '%s' '${BW_ACCESS_TOKEN_B64}' | base64 -d)\"
            export ENVIRONMENT='${{ env.ENVIRONMENT }}'
            export AZURE_STORAGE_CONNECTION_STRING=\"\$(printf '%s' '${AZURE_STORAGE_CONNECTION_STRING_B64}' | base64 -d)\"
            export AZURE_STORAGE_CONTAINER_ACTAS='actas-cliente-instalacion'
            export AZURE_STORAGE_CONTAINER_CARPENTRY_DOCS='carpentry-docs'
            export DOCKERHUB_USERNAME=\"\$(printf '%s' '${DOCKERHUB_USERNAME_B64}' | base64 -d)\"
            export DOCKERHUB_TOKEN=\"\$(printf '%s' '${DOCKERHUB_TOKEN_B64}' | base64 -d)\"
            /opt/allstar-api/deploy.sh
            if ! docker exec allstar-api printenv AZURE_STORAGE_CONNECTION_STRING >/dev/null 2>&1; then
              echo 'Azure Storage env vars were not present in container; recreating container with required env.'
              docker rm -f allstar-api >/dev/null 2>&1 || true
              docker run -d \
                --name allstar-api \
                --restart unless-stopped \
                -p 80:8000 \
                -e ENVIRONMENT \
                -e BW_ACCESS_TOKEN \
                -e AZURE_STORAGE_CONNECTION_STRING \
                -e AZURE_STORAGE_CONTAINER_ACTAS \
                -e AZURE_STORAGE_CONTAINER_CARPENTRY_DOCS \
                '${{ env.IMAGE_NAME }}:prod'
            fi"

      - name: Enforce container restart policy
        run: |
          ssh -i /tmp/id_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "set -e
            docker update --restart unless-stopped allstar-api
            docker inspect --format='RestartPolicy={{.HostConfig.RestartPolicy.Name}} Health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}} State={{.State.Status}}' allstar-api"

      - name: Verify API health on VM
        run: |
          ssh -i /tmp/id_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "set -e
            echo 'Container status:'
            docker ps -a --filter name=allstar-api
            echo 'Waiting for API health...'
            LOCAL_READY='http://127.0.0.1/api/v1/health/ready'
            TAILSCALE_READY='http://${{ secrets.VM_TAILSCALE_IP }}/api/v1/health/ready'
            for i in \$(seq 1 12); do
              if curl -fsS --connect-timeout 3 --max-time 8 \"\${LOCAL_READY}\" || curl -fsS --connect-timeout 3 --max-time 8 \"\${TAILSCALE_READY}\"; then
                echo
                echo 'API healthcheck passed.'
                exit 0
              fi
              sleep 5
            done
            echo 'API did not become healthy on first pass. Restarting container once...'
            docker restart allstar-api
            for i in \$(seq 1 12); do
              if curl -fsS --connect-timeout 3 --max-time 8 \"\${LOCAL_READY}\" || curl -fsS --connect-timeout 3 --max-time 8 \"\${TAILSCALE_READY}\"; then
                echo
                echo 'API healthcheck passed after restart.'
                exit 0
              fi
              sleep 5
            done
            echo 'API did not become healthy. Container inspect:'
            docker inspect --format='State={{.State.Status}} ExitCode={{.State.ExitCode}} Error={{.State.Error}} Health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' allstar-api || true
            echo 'Last container logs:'
            docker logs --tail 200 allstar-api || true
            exit 1"

      - name: Configure and verify Tailscale HTTPS proxy
        run: |
          ssh -i /tmp/id_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "set -e
            PROXY_TARGET='http://127.0.0.1:80'
            if ! curl -fsS --connect-timeout 2 --max-time 5 \"\${PROXY_TARGET}/api/v1/health/live\" >/dev/null; then
              PROXY_TARGET='http://${{ secrets.VM_TAILSCALE_IP }}:80'
            fi
            echo \"Configuring Tailscale Serve to proxy HTTPS 443 -> \${PROXY_TARGET}\"
            if command -v tailscale >/dev/null 2>&1; then
              if timeout 30s tailscale serve --yes --bg --https=443 \"\${PROXY_TARGET}\"; then
                echo 'Tailscale Serve configured.'
              elif command -v sudo >/dev/null 2>&1 && sudo -n timeout 30s tailscale serve --yes --bg --https=443 \"\${PROXY_TARGET}\"; then
                echo 'Tailscale Serve configured with sudo.'
              else
                echo 'Unable to configure Tailscale Serve.'
                timeout 10s tailscale serve status || true
                exit 1
              fi
              timeout 10s tailscale serve status || true
            else
              echo 'tailscale command is not available on the VM.'
              exit 1
            fi"

          echo 'Verifying public API URL through Tailscale HTTPS from GitHub runner...'
          for i in $(seq 1 12); do
            if curl -fsS --connect-timeout 5 --max-time 10 "${{ env.PUBLIC_API_HEALTH_URL }}"; then
              echo
              echo 'Public Tailscale HTTPS healthcheck passed.'
              exit 0
            fi
            echo "Public API healthcheck attempt ${i}/12 failed; retrying..."
            sleep 10
          done
          echo 'Warning: Public API URL did not respond from the GitHub runner after VM-local health passed.'
