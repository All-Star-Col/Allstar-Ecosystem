name: Build & Deploy (prod)

on:
  push:
    branches: ["master"]
    paths:
      - 'services/api-service/**'

permissions:
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: true

env:
  IMAGE_NAME: starbotdocker/allstar-fastapi-repository
  ENVIRONMENT: prod

jobs:
  build_push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-service
          file: ./services/api-service/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:prod
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy_vm:
    runs-on: ubuntu-latest
    needs: build_push
    timeout-minutes: 20
    steps:
      - name: Tailscale up (OAuth)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Debug Tailscale
        run: |
          tailscale status
          tailscale ping -c 3 ${{ secrets.VM_TAILSCALE_IP }} || true

      - name: Prepare SSH key (multiline)
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/id_key <<'EOF'
          ${{ secrets.VM_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 /tmp/id_key
          ssh-keygen -y -f /tmp/id_key > /dev/null

      - name: Test TCP 22
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd
          nc -vz ${{ secrets.VM_TAILSCALE_IP }} 22

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VM_TAILSCALE_IP }}" >> ~/.ssh/known_hosts

      - name: DEBUG – Show public key from secret
        run: |
          ssh-keygen -y -f /tmp/id_key

      - name: Deploy via native SSH (Tailscale)
        run: |
          ssh -i /tmp/id_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VM_SSH_USER }}@${{ secrets.VM_TAILSCALE_IP }}" \
            "BW_ACCESS_TOKEN='${{ secrets.BW_ACCESS_TOKEN }}' \
            ENVIRONMENT='${{ env.ENVIRONMENT }}' \
            DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
            DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}' \
            /opt/allstar-api/deploy.sh"
